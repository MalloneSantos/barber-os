services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: barber_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - barber_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barber_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  barber_postgres:

